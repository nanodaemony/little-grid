version: '3.8'

services:
  # 前端服务（仅 Frontend）
  frontend:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: littlegrid-frontend
    restart: unless-stopped
    ports:
      - "8001:8001"
    extra_hosts:
      # Linux 上需要此配置，让容器能访问宿主机
      - "host.docker.internal:host-gateway"